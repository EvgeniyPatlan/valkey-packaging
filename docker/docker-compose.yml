version: '3.8'

services:
  valkey:
    build:
      context: .
      dockerfile: Dockerfile.hardened
    image: percona/valkey:9.0.2-hardened
    container_name: valkey-hardened
    hostname: valkey
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=seccomp-valkey.json
    
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    
    read_only: true
    
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
      - /run/valkey:noexec,nosuid,nodev,size=32m
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    
    pids_limit: 200
    ulimits:
      nproc: 65535
      nofile:
        soft: 40000
        hard: 40000
    
    ports:
      - "127.0.0.1:6379:6379"
    
    networks:
      - valkey-net
    
    volumes:
      - valkey-data:/data:rw
      # Optional: mount custom config to override defaults
      # - ./valkey.conf:/etc/valkey/valkey.conf:ro
    
    # Use default config from package, or specify custom config path
    # command: ["valkey-server", "/etc/valkey/valkey.conf"]
    
    # Environment variables for configuration
    environment:
      - TZ=UTC
      # Set password via environment variable (recommended for production)
      # - VALKEY_PASSWORD=your_strong_password_here
      # Override max memory
      # - VALKEY_MAXMEMORY=512mb
      # Override bind address (default from package config)
      # - VALKEY_BIND=0.0.0.0
    
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  valkey-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-valkey
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  valkey-data:
    driver: local
